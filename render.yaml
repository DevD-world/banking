services:
  - type: web
    name: banking
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: COMPLETION_IQ_DATA_DIR
        value: /var/data
      - key: COMPLETION_IQ_ALLOWED_ORIGIN
        value: "*"
    disk:
      name: banking-data
      mountPath: /var/data
      sizeGB: 1
