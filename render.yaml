services:
  - type: web
    name: banking-production
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: COMPLETION_IQ_DATA_DIR
        value: /tmp/completion-iq
      - key: COMPLETION_IQ_ALLOWED_ORIGIN
        value: "*"
